services:
  frontend:
    build:
      context: .
      args:
        NPM_REGISTRY: ${NPM_REGISTRY:-}
        HTTP_PROXY: ${HTTP_PROXY:-}
        HTTPS_PROXY: ${HTTPS_PROXY:-}
        NO_PROXY: ${NO_PROXY:-localhost,127.0.0.1,backend,frontend}
    container_name: personal-workbench-frontend
    ports:
      - "8080:8080"
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      args:
        NPM_REGISTRY: ${NPM_REGISTRY:-}
        HTTP_PROXY: ${HTTP_PROXY:-}
        HTTPS_PROXY: ${HTTPS_PROXY:-}
        NO_PROXY: ${NO_PROXY:-localhost,127.0.0.1,backend,frontend}
    container_name: personal-workbench-backend
    environment:
      - PORT=3000
      - DATA_FILE=/data/workbench.json
      # Optional: set API_TOKEN and send Authorization: Bearer <token> if you expose this beyond localhost.
      - API_TOKEN=
    volumes:
      - workbench-data:/data
    restart: unless-stopped

volumes:
  workbench-data:
